    <style>
        /* Variáveis para o Light Mode (Padrão) */
        :root {
            --primary-color: #0056b3;
            --text-main: #333;
            --text-light: #666;
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --card-shadow: rgba(0,0,0,0.05);
            --border-color: #e2e8f0;
            --icon-color: #ffffff;
        }

        /* Variáveis para o Dark Mode */
        [data-theme="dark"] {
            --primary-color: #3b82f6;
            --text-main: #f3f4f6;
            --text-light: #9ca3af;
            --bg-light: #0f172a;
            --white: #1e293b;
            --card-shadow: rgba(0,0,0,0.3);
            --border-color: #334155;
            --icon-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
        }
        header {
            position: relative;
            background: linear-gradient(135deg, #001f3f, #0056b3);
            color: #ffffff;
            padding: 4rem 2rem;
            text-align: center;
        }
        
        /* Contentor dos Controlos Minimalistas (Topo Direito) */
        .header-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
        }

        /* Botão Único de Idioma Alternável */
        .lang-toggle-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .lang-toggle-btn svg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Botão de Tema */
        .theme-toggle-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .header-controls button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
            border-color: #ffffff;
        }
        .theme-toggle-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--icon-color);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #ffffff;
            object-fit: cover;
            margin-bottom: 1rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            padding: 0 10px;
        }
        header p {
            font-size: 1.2rem;
            font-weight: 300;
            opacity: 0.9;
            margin-bottom: 1.5rem;
        }
        .contact-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 100%;
            padding: 0 1rem;
        }
        .contact-links a {
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #ffffff;
            padding: 6px 18px;
            border-radius: 20px;
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 0.95rem;
        }
        .contact-links a:hover {
            background: #ffffff;
            color: #0056b3;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        section {
            background: var(--white);
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px var(--card-shadow);
            border: 1px solid var(--border-color);
        }
        h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--bg-light);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .skill-item {
            background: var(--bg-light);
            padding: 1rem;
            border-radius: 5px;
            text-align: center;
            font-weight: 500;
            border: 1px solid var(--border-color);
        }
        .job {
            margin-bottom: 2rem;
        }
        .job:last-child {
            margin-bottom: 0;
        }
        .job-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        .job-date {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .job ul {
            margin-left: 1.5rem;
            color: var(--text-main);
        }
        .job li {
            margin-bottom: 0.5rem;
        }
        .education-item {
            margin-bottom: 1.5rem;
        }
        .education-title {
            font-weight: bold;
        }
        .language-list {
            list-style: none;
        }
        .language-list li {
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }
    </style>
</head>

            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                updateIcon('light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                updateIcon('dark');
            }
        });

        langToggleBtn.addEventListener('click', () => {
            let lang = localStorage.getItem('language') || 'pt';
            setLanguage(lang === 'pt' ? 'en' : 'pt');
        });
    </script>
</body>
</html>
